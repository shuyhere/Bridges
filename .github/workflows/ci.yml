name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --manifest-path cli/Cargo.toml --check

      - name: Clippy
        run: cargo clippy --manifest-path cli/Cargo.toml -- -D warnings

      - name: Tests
        run: cargo test --manifest-path cli/Cargo.toml

  typescript-checks:
    name: TypeScript checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci --ignore-scripts

      - name: Type check listener
        if: ${{ hashFiles('listener/package.json') != '' }}
        run: |
          cd listener
          npm ci --ignore-scripts
          npx tsc --noEmit

      - name: Type check registry
        if: ${{ hashFiles('registry/package.json') != '' }}
        run: |
          cd registry
          npm ci --ignore-scripts
          npx tsc --noEmit

      - name: Test registry
        if: ${{ hashFiles('registry/package.json') != '' }}
        run: |
          cd registry
          npm run build
          npm rebuild better-sqlite3
          npm test

  integration:
    name: Integration test
    runs-on: ubuntu-latest
    needs: [rust-checks, typescript-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build native binary
        run: cargo build --release --manifest-path cli/Cargo.toml

      - name: Copy binary
        run: node scripts/copy-native.js

      - name: Verify binary runs
        run: node bin/bridges.js --version
